name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  kondo:
    name: clj-kondo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Run clj-kondo
        run: clojure -M:kondo
