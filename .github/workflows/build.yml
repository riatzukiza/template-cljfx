name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  uberjar:
    name: Build Uberjar
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-count-revs in build.clj

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@12
        with:
          cli: latest

      - name: Build uberjar
        run: clojure -T:build uberjar

      - name: Upload uberjar artifact
        uses: actions/upload-artifact@v4
        with:
          name: uberjar
          path: target/*-standalone.jar
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/*-standalone.jar
